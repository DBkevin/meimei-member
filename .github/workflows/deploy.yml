name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: meimei-member-production
  cancel-in-progress: true

env:
  APP_ROOT: /opt/meimei-member
  GO_VERSION: "1.24.2"
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build server/member-api
        working-directory: ./server
        run: |
          set -euo pipefail
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o member-api .

      - name: Build web/dist
        working-directory: ./web
        run: |
          set -euo pipefail
          npm install
          npm run build

      - name: Package release.tar.gz
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/server release/web
          cp server/member-api release/server/member-api
          cp -r web/dist release/web/dist
          tar -czf release.tar.gz -C release .

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release and deploy files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${APP_ROOT}/deploy' '${APP_ROOT}/server' '${APP_ROOT}/web' '${APP_ROOT}/backups' '${APP_ROOT}/releases'"
          scp -P "${DEPLOY_PORT:-22}" release.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${APP_ROOT}/release.tar.gz"
          scp -P "${DEPLOY_PORT:-22}" deploy/deploy.sh deploy/member-api.service deploy/nginx.conf.example \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${APP_ROOT}/deploy/"

      - name: Run remote deploy script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x '${APP_ROOT}/deploy/deploy.sh' && '${APP_ROOT}/deploy/deploy.sh' '${APP_ROOT}/release.tar.gz'"
